<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="31" fill="#0a0e17" stroke="#00e5ff" stroke-width="1.5"/>
  <!-- Globe grid lines -->
  <circle cx="32" cy="32" r="20" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <ellipse cx="32" cy="32" rx="10" ry="20" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="32" y1="12" x2="32" y2="52" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Targeting reticle -->
  <circle cx="32" cy="32" r="6" stroke="#00e5ff" stroke-width="1.2" fill="none"/>
  <!-- Cross hairs -->
  <line x1="26" y1="32" x2="22" y2="32" stroke="#00e5ff" stroke-width="1.2"/>
  <line x1="38" y1="32" x2="42" y2="32" stroke="#00e5ff" stroke-width="1.2"/>
  <line x1="32" y1="26" x2="32" y2="22" stroke="#00e5ff" stroke-width="1.2"/>
  <line x1="32" y1="38" x2="32" y2="42" stroke="#00e5ff" stroke-width="1.2"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#00e5ff"/>
  <!-- Corner brackets top-left -->
  <path d="M16 20 L16 16 L20 16" stroke="#00e5ff" stroke-width="1.2" fill="none"/>
  <!-- Corner brackets top-right -->
  <path d="M48 20 L48 16 L44 16" stroke="#00e5ff" stroke-width="1.2" fill="none"/>
  <!-- Corner brackets bottom-left -->
  <path d="M16 44 L16 48 L20 48" stroke="#00e5ff" stroke-width="1.2" fill="none"/>
  <!-- Corner brackets bottom-right -->
  <path d="M48 44 L48 48 L44 48" stroke="#00e5ff" stroke-width="1.2" fill="none"/>
</svg>
